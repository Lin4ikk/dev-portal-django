{% extends 'base.html' %}

{% block title %}Вход в систему | Блог{% endblock %}

{% block content %}
<div class="col-md-6 mx-auto">
    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="card-title text-center mb-4">Авторизация</h2>
            
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="id_username" class="form-label">Имя пользователя (логин)</label>
                    <input type="text" name="username" autofocus required id="id_username" class="form-control">
                </div>
                
                <div class="mb-3">
                    <label for="id_password" class="form-label">Пароль</label>
                    <input type="password" name="password" required id="id_password" class="form-control">
                </div>
                
                {% if form.errors %}
                    <div class="alert alert-danger small">Неверное имя пользователя или пароль.</div>
                {% endif %}
                
                <button type="submit" class="btn bg-dark text-light w-100 mt-2">Войти</button>
            </form>
            
            <div class="text-center mt-3">
                <small class="text-muted">Еще нет аккаунта? <a href="{% url 'accounts:register' %}">Создать аккаунт</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
