{% extends 'base.html' %}

{% block title %}Регистрация | Блог{% endblock %}

{% block content %}
<div class="col-md-6 mx-auto">
    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="card-title text-center mb-4">Регистрация нового аккаунта</h2>
            
            <form method="post">
                {% csrf_token %} {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                
                <button type="submit" class="btn btn-primary w-100 mt-2">Зарегистрироваться</button>
            </form>
            
            <div class="text-center mt-3">
                <small class="text-muted">Уже есть аккаунт? <a href="{% url 'accounts:login' %}">Войти</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
